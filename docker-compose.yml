version: "3.9"

services:
  backend:
    build: ./backend
    container_name: ms2026-backend
    environment:
      - BT_AUTO_LOAD_REAL_DATA=true
      - BT_REPLACE_EXISTING_DATA=true
      - BT_ENABLE_SAMPLE_SEED=false
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
  frontend:
    build: ./frontend
    container_name: ms2026-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  frontend_node_modules:
